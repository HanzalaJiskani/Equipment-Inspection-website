<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipment Management System - Edit Equipment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 0;
            margin-bottom: 30px;
        }
        .edit-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .card-header {
            background: linear-gradient(45deg, #28a745, #20c997);
            color: white;
            border-radius: 15px 15px 0 0;
            padding: 20px;
        }
        .form-control, .form-select {
            border-radius: 8px;
            border: 2px solid #e9ecef;
            padding: 12px 15px;
        }
        .form-control:focus, .form-select:focus {
            border-color: #28a745;
            box-shadow: 0 0 0 0.2rem rgba(40, 167, 69, 0.25);
        }
        .btn-update {
            background: linear-gradient(45deg, #007bff, #0056b3);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            color: white;
        }
        .btn-update:hover {
            opacity: 0.9;
            color: white;
        }
        .inspection-item {
            background: #f8f9fa;
            border-left: 4px solid #28a745;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
        }
        .status-badge {
            font-size: 0.8em;
            padding: 4px 8px;
        }
    </style>
</head>
<body>
    <!-- Page Header -->
    <div class="page-header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <h2><i class="fas fa-edit"></i> Edit Equipment</h2>
                    <p class="mb-0">Equipment ID: <strong id="headerEquipmentId"></strong></p>
                </div>
                <div class="col-md-6 text-md-end">
                    <a href="#" id="viewDetailsLink" class="btn btn-light me-2">
                        <i class="fas fa-eye"></i> View Details
                    </a>
                    <a href="index.html" class="btn btn-outline-light">
                        <i class="fas fa-arrow-left"></i> Back to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Messages -->
        <div id="successAlert" class="alert alert-success alert-dismissible fade show" role="alert" style="display:none;">
            <i class="fas fa-check-circle"></i> <span id="successMessage"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div id="errorAlert" class="alert alert-danger alert-dismissible fade show" role="alert" style="display:none;">
            <i class="fas fa-exclamation-triangle"></i> <span id="errorMessage"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div id="equipmentContent" style="display:none;">
            <div class="row">
                <!-- Edit Form -->
                <div class="col-lg-8">
                    <div class="edit-card card">
                        <div class="card-header">
                            <h5 class="mb-0"><i class="fas fa-keyboard"></i> Equipment Information</h5>
                        </div>
                        <div class="card-body">
                            <form id="editForm">
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label for="equipment_id_display" class="form-label">
                                                <i class="fas fa-tag text-danger"></i> Equipment ID
                                            </label>
                                            <input type="text" class="form-control" id="equipment_id_display" disabled>
                                            <div class="form-text">Equipment ID cannot be changed</div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label for="type" class="form-label">
                                                <i class="fas fa-cogs text-primary"></i> Equipment Type
                                            </label>
                                            <input type="text" class="form-control" id="type" name="type" 
                                                   placeholder="e.g., Fire Extinguisher, Safety Equipment">
                                        </div>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label for="location" class="form-label">
                                                <i class="fas fa-map-marker-alt text-success"></i> Location
                                            </label>
                                            <input type="text" class="form-control" id="location" name="location" 
                                                   placeholder="e.g., Emergency Ward, Operation Theater">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label for="area" class="form-label">
                                                <i class="fas fa-building text-info"></i> Area
                                            </label>
                                            <input type="text" class="form-control" id="area" name="area" 
                                                   placeholder="e.g., Ward A, Ground Floor">
                                        </div>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label for="frequency" class="form-label">
                                                <i class="fas fa-clock text-warning"></i> Inspection Frequency
                                            </label>
                                            <select class="form-select" id="frequency" name="frequency" onchange="updateDueDate()">
                                                <option value="Monthly">Monthly (30 days)</option>
                                                <option value="Quarterly">Quarterly (90 days)</option>
                                                <option value="Bi-Annually">Bi-Annually (180 days)</option>
                                                <option value="Annually">Annually (360 days)</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label for="due_date" class="form-label">
                                                <i class="fas fa-calendar text-secondary"></i> Next Due Date
                                            </label>
                                            <input type="date" class="form-control" id="due_date" name="due_date">
                                            <div class="form-text">Current status: <span id="dueDateStatus"></span></div>
                                        </div>
                                    </div>
                                </div>

                                <div class="text-center">
                                    <button type="submit" class="btn btn-update btn-lg">
                                        <i class="fas fa-save"></i> Update Equipment
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Equipment Status & Actions -->
                <div class="col-lg-4">
                    <!-- Current Status -->
                    <div class="edit-card card">
                        <div class="card-header">
                            <h5 class="mb-0"><i class="fas fa-info-circle"></i> Equipment Status</h5>
                        </div>
                        <div class="card-body">
                            <div class="text-center mb-3" id="statusDisplay"></div>

                            <div class="d-grid gap-2">
                                <a href="#" id="startInspectionLink" class="btn btn-success">
                                    <i class="fas fa-clipboard-check"></i> Start Inspection
                                </a>
                                <a href="#" id="generateQrLink" class="btn btn-info">
                                    <i class="fas fa-qrcode"></i> Generate QR Code
                                </a>
                                <button class="btn btn-danger" onclick="deleteEquipment()">
                                    <i class="fas fa-trash"></i> Delete Equipment
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Quick Stats -->
                    <div class="edit-card card">
                        <div class="card-header">
                            <h5 class="mb-0"><i class="fas fa-chart-bar"></i> Inspection History</h5>
                        </div>
                        <div class="card-body" id="inspectionHistory">
                            <p class="text-muted text-center">Loading inspection history...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const SITE_NAME = "Equipment Management System";

        // Sample equipment data (in a real application, this would come from a database)
        const equipmentData = {
            "EQ001": {
                equipment_id: "EQ001",
                type: "Fire Extinguisher",
                location: "Building A - Floor 1",
                area: "Main Lobby",
                frequency: "Monthly",
                due_date: "2024-12-31"
            },
            "EQ002": {
                equipment_id: "EQ002",
                type: "Fire Extinguisher",
                location: "Building B - Floor 2",
                area: "Cafeteria",
                frequency: "Monthly",
                due_date: "2024-12-25"
            },
            "EQ003": {
                equipment_id: "EQ003",
                type: "Fire Extinguisher",
                location: "Building C - Floor 3",
                area: "Server Room",
                frequency: "Weekly",
                due_date: "2024-12-15"
            }
        };

        // Sample inspection data
        const inspectionData = {
            "EQ001": [
                {
                    inspector_name: "John Smith",
                    submitted_at: "2024-11-15",
                    q1_safety_pin: "Yes",
                    q2_gauge_green: "Yes",
                    q3_weight_appropriate: "Yes",
                    q4_no_damage: "Yes",
                    q5_hanging_clip: "Yes",
                    q6_accessible: "Yes",
                    q7_refill_overdue: "No",
                    q8_instructions_visible: "Yes",
                    remarks: "All checks passed"
                },
                {
                    inspector_name: "Jane Doe",
                    submitted_at: "2024-10-20",
                    q1_safety_pin: "Yes",
                    q2_gauge_green: "Yes",
                    q3_weight_appropriate: "Yes",
                    q4_no_damage: "No",
                    q5_hanging_clip: "Yes",
                    q6_accessible: "Yes",
                    q7_refill_overdue: "No",
                    q8_instructions_visible: "Yes",
                    remarks: "Minor dent observed"
                }
            ],
            "EQ002": [
                {
                    inspector_name: "Mike Johnson",
                    submitted_at: "2024-11-10",
                    q1_safety_pin: "Yes",
                    q2_gauge_green: "Yes",
                    q3_weight_appropriate: "Yes",
                    q4_no_damage: "Yes",
                    q5_hanging_clip: "Yes",
                    q6_accessible: "Yes",
                    q7_refill_overdue: "No",
                    q8_instructions_visible: "Yes",
                    remarks: ""
                }
            ],
            "EQ003": []
        };

        let currentEquipmentId = null;

        // Helper functions
        function formatDate(dateString) {
            if (!dateString || dateString === '0000-00-00') {
                return 'N/A';
            }
            const date = new Date(dateString);
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            return date.toLocaleDateString('en-US', options);
        }

        function isOverdue(dateString) {
            if (!dateString || dateString === '0000-00-00') {
                return false;
            }
            const dueDate = new Date(dateString);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            return dueDate < today;
        }

        function isDueSoon(dateString) {
            if (!dateString || dateString === '0000-00-00') {
                return false;
            }
            const dueDate = new Date(dateString);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const oneWeekLater = new Date(today);
            oneWeekLater.setDate(oneWeekLater.getDate() + 7);
            return dueDate >= today && dueDate <= oneWeekLater;
        }

        function calculateInspectionScore(inspection) {
            const questions = [
                inspection.q1_safety_pin === 'Yes' ? 1 : 0,
                inspection.q2_gauge_green === 'Yes' ? 1 : 0,
                inspection.q3_weight_appropriate === 'Yes' ? 1 : 0,
                inspection.q4_no_damage === 'Yes' ? 1 : 0,
                inspection.q5_hanging_clip === 'Yes' ? 1 : 0,
                inspection.q6_accessible === 'Yes' ? 1 : 0,
                inspection.q7_refill_overdue === 'No' ? 1 : 0,
                inspection.q8_instructions_visible === 'Yes' ? 1 : 0
            ];
            return questions.reduce((a, b) => a + b, 0);
        }

        // Get equipment ID from URL
        function getEquipmentId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        // Show error
        function showError(message) {
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('errorAlert').style.display = 'block';
        }

        // Show success
        function showSuccess(message) {
            document.getElementById('successMessage').textContent = message;
            document.getElementById('successAlert').style.display = 'block';
            setTimeout(() => {
                document.getElementById('successAlert').style.display = 'none';
            }, 5000);
        }

        // Update due date status text
        function updateDueDateStatus() {
            const dueDate = document.getElementById('due_date').value;
            const statusSpan = document.getElementById('dueDateStatus');
            
            if (isOverdue(dueDate)) {
                statusSpan.innerHTML = '<span class="text-danger"><strong>OVERDUE</strong></span>';
            } else if (isDueSoon(dueDate)) {
                statusSpan.innerHTML = '<span class="text-warning"><strong>DUE SOON</strong></span>';
            } else {
                statusSpan.innerHTML = '<span class="text-success"><strong>CURRENT</strong></span>';
            }
        }

        // Update due date based on frequency
        function updateDueDate() {
            const frequency = document.getElementById('frequency').value;
            const days = {
                'Monthly': 30,
                'Quarterly': 90,
                'Bi-Annually': 180,
                'Annually': 360
            };
            
            const today = new Date();
            const dueDate = new Date(today.getTime() + (days[frequency] * 24 * 60 * 60 * 1000));
            
            const dueDateField = document.getElementById('due_date');
            if (!dueDateField.value || confirm('Update due date based on new frequency?')) {
                dueDateField.value = dueDate.toISOString().split('T')[0];
                updateDueDateStatus();
            }
        }

        // Display equipment status
        function displayEquipmentStatus(equipment) {
            const statusDisplay = document.getElementById('statusDisplay');
            
            if (isOverdue(equipment.due_date)) {
                statusDisplay.innerHTML = `
                    <div class="alert alert-danger">
                        <i class="fas fa-exclamation-triangle fa-2x"></i>
                        <h6 class="mt-2">OVERDUE</h6>
                        <small>Inspection required immediately</small>
                    </div>
                `;
            } else if (isDueSoon(equipment.due_date)) {
                statusDisplay.innerHTML = `
                    <div class="alert alert-warning">
                        <i class="fas fa-clock fa-2x"></i>
                        <h6 class="mt-2">DUE SOON</h6>
                        <small>Inspection needed within 7 days</small>
                    </div>
                `;
            } else {
                statusDisplay.innerHTML = `
                    <div class="alert alert-success">
                        <i class="fas fa-check-circle fa-2x"></i>
                        <h6 class="mt-2">CURRENT</h6>
                        <small>Next inspection: ${formatDate(equipment.due_date)}</small>
                    </div>
                `;
            }
        }

        // Display inspection history
        function displayInspectionHistory(equipmentId) {
            const inspections = inspectionData[equipmentId] || [];
            const historyDiv = document.getElementById('inspectionHistory');
            
            if (inspections.length === 0) {
                historyDiv.innerHTML = `
                    <p class="text-muted text-center">No inspections recorded yet</p>
                    <div class="text-center">
                        <a href="login.html?equipment_id=${equipmentId}" class="btn btn-outline-success btn-sm">
                            <i class="fas fa-plus"></i> Add First Inspection
                        </a>
                    </div>
                `;
                return;
            }
            
            let html = `<p class="mb-3">Total Inspections: <strong>${inspections.length}</strong></p>`;
            html += '<div style="max-height: 300px; overflow-y: auto;">';
            
            inspections.forEach(inspection => {
                const score = calculateInspectionScore(inspection);
                const percentage = Math.round((score / 8) * 100);
                const badgeClass = percentage >= 80 ? 'bg-success' : (percentage >= 60 ? 'bg-warning' : 'bg-danger');
                
                html += `
                    <div class="inspection-item">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <strong>${inspection.inspector_name}</strong><br>
                                <small class="text-muted">${formatDate(inspection.submitted_at)}</small>
                            </div>
                            <div class="text-end">
                                <span class="badge ${badgeClass}">${percentage}%</span>
                            </div>
                        </div>
                        ${inspection.remarks ? `
                            <div class="mt-2">
                                <small><strong>Remarks:</strong> ${inspection.remarks}</small>
                            </div>
                        ` : ''}
                    </div>
                `;
            });
            
            html += '</div>';
            historyDiv.innerHTML = html;
        }

        // Load equipment data
        function loadEquipment(equipmentId) {
            const equipment = equipmentData[equipmentId];
            
            if (!equipment) {
                showError('Equipment not found.');
                window.location.href = 'index.html';
                return;
            }
            
            currentEquipmentId = equipmentId;
            
            // Update header
            document.getElementById('headerEquipmentId').textContent = equipment.equipment_id;
            
            // Update form fields
            document.getElementById('equipment_id_display').value = equipment.equipment_id;
            document.getElementById('type').value = equipment.type;
            document.getElementById('location').value = equipment.location;
            document.getElementById('area').value = equipment.area;
            document.getElementById('frequency').value = equipment.frequency;
            document.getElementById('due_date').value = equipment.due_date;
            
            // Update links
            document.getElementById('viewDetailsLink').href = `index.html?id=${equipmentId}`;
            document.getElementById('startInspectionLink').href = `login.html?equipment_id=${equipmentId}`;
            document.getElementById('generateQrLink').href = `generate-qr.html?id=${equipmentId}`;
            
            // Display status and history
            displayEquipmentStatus(equipment);
            displayInspectionHistory(equipmentId);
            updateDueDateStatus();
            
            // Show content
            document.getElementById('equipmentContent').style.display = 'block';
        }

        // Handle form submission
        function handleFormSubmit(e) {
            e.preventDefault();
            
            const dueDateField = document.getElementById('due_date');
            
            if (dueDateField.value) {
                const selectedDate = new Date(dueDateField.value);
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                
                if (selectedDate < today) {
                    if (!confirm('The selected due date is in the past. This will mark the equipment as overdue. Do you want to continue?')) {
                        return false;
                    }
                }
            }
            
            // Get form data
            const formData = {
                equipment_id: currentEquipmentId,
                type: document.getElementById('type').value,
                location: document.getElementById('location').value,
                area: document.getElementById('area').value,
                frequency: document.getElementById('frequency').value,
                due_date: document.getElementById('due_date').value
            };
            
            // Update equipment data (in a real application, this would be saved to a database)
            equipmentData[currentEquipmentId] = {
                ...equipmentData[currentEquipmentId],
                ...formData
            };
            
            // Show success message
            showSuccess('Equipment updated successfully!');
            
            // Update status display
            displayEquipmentStatus(equipmentData[currentEquipmentId]);
            updateDueDateStatus();
            
            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Delete equipment function
        function deleteEquipment() {
            if (confirm('Are you sure you want to delete this equipment?\n\nThis will also delete all inspection records associated with it.\n\nThis action cannot be undone.')) {
                // In a real application, this would make an API call
                delete equipmentData[currentEquipmentId];
                delete inspectionData[currentEquipmentId];
                
                alert('Equipment deleted successfully!');
                window.location.href = 'index.html';
            }
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            const equipmentId = getEquipmentId();
            
            if (!equipmentId) {
                window.location.href = 'index.html';
                return;
            }
            
            loadEquipment(equipmentId);
            
            // Setup form submission
            document.getElementById('editForm').addEventListener('submit', handleFormSubmit);
            
            // Setup due date change listener
            document.getElementById('due_date').addEventListener('change', updateDueDateStatus);
        });
    </script>
</body>
</html>
