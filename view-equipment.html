<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Equipment - {{ equipment.equipment_id }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: #f0f2f5;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }
        .card {
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }
        .icon-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }
        .status-active {
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                
                <div class="card rounded-4 overflow-hidden">
                    <div class="card-body p-4 text-center">
                        
                        <div class="icon-circle">
                            <i class="fas fa-fire-extinguisher fa-3x"></i>
                        </div>
                        
                        <h2 class="fw-bold mb-1">{{ equipment.type_name }}</h2>
                        <p class="text-muted mb-3">{{ equipment.equipment_id }}</p>
                        
                        <div class="mb-4">
                            <span class="status-active">
                                <i class="fas fa-check-circle me-1"></i> Active
                            </span>
                        </div>

                        <div class="bg-light rounded-4 p-3 mb-4 text-start">
                            <div class="d-flex justify-content-between mb-3 border-bottom pb-2">
                                <span class="text-muted small">Location</span>
                                <span class="fw-bold text-dark">{{ equipment.location_name }}</span>
                            </div>
                            <div class="d-flex justify-content-between mb-3 border-bottom pb-2">
                                <span class="text-muted small">Frequency</span>
                                <span class="fw-bold text-dark">{{ equipment.frequency_name }}</span>
                            </div>
                            <div class="d-flex justify-content-between">
                                <span class="text-muted small">Next Due</span>
                                <span class="fw-bold text-primary">{{ equipment.due_date }}</span>
                            </div>
                        </div>

                        <a href="{{ url_for('login', equipment_id=equipment.equipment_id) }}" class="btn btn-primary w-100 py-3 rounded-pill fw-bold mb-3 shadow">
                            <i class="fas fa-clipboard-check me-2"></i>Inspect Now
                        </a>
                        
                        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary w-100 rounded-pill border-0">
                            Go to Dashboard
                        </a>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
